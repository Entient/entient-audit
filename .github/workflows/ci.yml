name: Conformance Proof

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  prove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyNaCl tomli

      - name: Run conformance proof
        run: make prove

      - name: Verify envelope fixtures
        run: python test_envelope_verify.py
